<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สแกนบัตรพนักงาน</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg:        #0C0F14;
            --surface:   #141820;
            --border:    #1E2530;
            --accent:    #00D4FF;
            --accent-dim:#003D4D;
            --text:      #E8EDF2;
            --muted:     #5A6475;
            --success:   #00C896;
            --error:     #FF4D6A;
            --scan-line: rgba(0,212,255,0.15);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Sans Thai', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        /* ── Card shell ── */
        .card {
            width: 100%;
            max-width: 360px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0,212,255,0.06);
        }

        /* ── Scanner viewport ── */
        .scanner-zone {
            position: relative;
            height: 220px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* subtle grid */
        .scanner-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 28px 28px;
            opacity: 0.5;
        }

        /* scan-line beam */
        .scan-beam {
            position: absolute;
            left: 20px; right: 20px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: scan 2.4s ease-in-out infinite;
            top: 20px;
        }

        @keyframes scan {
            0%   { top: 20px; opacity: 1; }
            50%  { opacity: 0.9; }
            100% { top: calc(100% - 20px); opacity: 1; }
        }

        /* corner brackets */
        .corners {
            position: absolute;
            width: 160px; height: 120px;
        }

        .corners::before,
        .corners::after,
        .corners span::before,
        .corners span::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            border-color: var(--accent);
            border-style: solid;
        }

        .corners::before  { top: 0; left: 0;  border-width: 2px 0 0 2px; }
        .corners::after   { top: 0; right: 0; border-width: 2px 2px 0 0; }
        .corners span::before { bottom: 0; left: 0;  border-width: 0 0 2px 2px; }
        .corners span::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

        /* card icon in center */
        .card-icon {
            position: relative;
            z-index: 1;
            width: 52px; height: 36px;
            border: 2px solid var(--muted);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.4;
        }

        .card-icon::before {
            content: '';
            width: 18px; height: 4px;
            background: var(--muted);
            border-radius: 2px;
        }

        /* ── Body ── */
        .body {
            padding: 24px 24px 28px;
            text-align: center;
        }

        .label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.3;
            color: var(--text);
            margin-bottom: 20px;
        }

        /* ── Status block ── */
        .status-wrap {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: border-color 0.3s;
            text-align: left;
        }

        .status-wrap.ok    { border-color: var(--success); }
        .status-wrap.error { border-color: var(--error); }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--muted);
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .status-wrap.ok    .status-dot { background: var(--success); box-shadow: 0 0 6px var(--success); }
        .status-wrap.error .status-dot { background: var(--error);   box-shadow: 0 0 6px var(--error);   }
        .status-wrap.loading .status-dot {
            background: var(--accent);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        #status-text {
            font-size: 14px;
            color: var(--text);
            line-height: 1.4;
        }

        #status-text .name {
            font-weight: 600;
            color: var(--accent);
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.02em;
        }

        /* ── Scan button ── */
        .scan-btn {
            width: 100%;
            margin-top: 14px;
            padding: 14px 16px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .scan-btn:active { transform: scale(0.98); }

        .scan-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .scan-btn svg { flex-shrink: 0; }

        /* secondary (outline) button for barcode */
        .scan-btn.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        /* ── Barcode camera overlay ── */
        .barcode-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 999;
            display: none;
            flex-direction: column;
        }

        .barcode-overlay.show { display: flex; }

        .barcode-overlay video {
            flex: 1;
            width: 100%;
            object-fit: cover;
        }

        .barcode-frame {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 320px;
            height: 90px;
            border: 2px solid var(--accent);
            border-radius: 8px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.5);
        }

        .barcode-close {
            position: absolute;
            top: 20px; right: 20px;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            border: none;
            color: #fff;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1;
        }

        .barcode-hint {
            position: absolute;
            bottom: 40px;
            left: 0; right: 0;
            text-align: center;
            color: #fff;
            font-size: 13px;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            opacity: 0.8;
        }

        /* ── Result block ── */
        .result-wrap {
            margin-top: 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            display: none;
        }

        .result-wrap.show { display: block; }

        .result-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .result-value {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            color: var(--success);
            word-break: break-all;
            line-height: 1.5;
        }

        /* ── Footer strip ── */
        .footer-strip {
            padding: 12px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-strip .dot-row {
            display: flex; gap: 4px;
        }

        .footer-strip .dot-row span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--border);
        }

        .footer-strip .dot-row span:first-child { background: var(--accent-dim); }

        .footer-meta {
            font-size: 11px;
            color: var(--muted);
            font-family: 'IBM Plex Mono', monospace;
        }
    </style>
</head>
<body>

<div class="card">

    <!-- scanner viewport -->
    <div class="scanner-zone">
        <div class="scan-beam"></div>
        <div class="corners"><span></span></div>
        <div class="card-icon"></div>
    </div>

    <!-- content -->
    <div class="body">
        <p class="label">Employee Access</p>
        <h1 class="title">สแกนบัตรพนักงาน</h1>

        <div class="status-wrap loading" id="status-wrap">
            <div class="status-dot"></div>
            <div id="status-text">กำลังเชื่อมต่อ…</div>
        </div>

        <button class="scan-btn" id="scan-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
            </svg>
            สแกน QR Code
        </button>

        <button class="scan-btn" id="barcode-btn" style="margin-top:10px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="5" width="2" height="14"/>
                <rect x="7" y="5" width="1" height="14"/>
                <rect x="10" y="5" width="2" height="14"/>
                <rect x="14" y="5" width="1" height="14"/>
                <rect x="17" y="5" width="2" height="14"/>
                <rect x="20" y="5" width="1" height="14"/>
            </svg>
            สแกนบาร์โค้ด
        </button>

        <p id="diag" style="margin-top:10px;font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;text-align:center;"></p>

        <div class="result-wrap" id="result-wrap">
            <p class="result-label">ผลการสแกน</p>
            <p class="result-value" id="result-value"></p>
        </div>
    </div>

    <div class="footer-strip">
        <div class="dot-row">
            <span></span><span></span><span></span>
        </div>
        <span class="footer-meta">LIFF · LINE SCAN</span>
    </div>

</div>

<!-- Barcode camera overlay (สำหรับบาร์โค้ดเส้น 1D ที่ scanCodeV2 อ่านไม่ได้) -->
<div class="barcode-overlay" id="barcode-overlay">
    <button class="barcode-close" id="barcode-close">✕</button>
    <video id="barcode-video" muted playsinline></video>
    <div class="barcode-frame"></div>
    <p class="barcode-hint">เล็งบาร์โค้ดให้อยู่ในกรอบ</p>
</div>

<script>
const LIFF_ID = "2010521821-XbCAobxK";

const wrap         = document.getElementById("status-wrap");
const txt          = document.getElementById("status-text");
const scanBtn       = document.getElementById("scan-btn");
const barcodeBtn     = document.getElementById("barcode-btn");
const resultWrap     = document.getElementById("result-wrap");
const resultValue    = document.getElementById("result-value");
const diag           = document.getElementById("diag");
const barcodeOverlay = document.getElementById("barcode-overlay");
const barcodeVideo   = document.getElementById("barcode-video");
const barcodeClose   = document.getElementById("barcode-close");

let mediaStream = null;

// โหลดสคริปต์เพิ่มเติมแบบ dynamic เป็น fallback กรณี CDN หลักโหลดไม่สำเร็จ
function loadScriptFallback(src) {
    return new Promise((resolve) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = () => resolve(true);
        s.onerror = () => resolve(false);
        document.head.appendChild(s);
    });
}

function setStatus(state, html) {
    wrap.className = "status-wrap " + state;
    txt.innerHTML = html;
}

// ส่งผลสแกน (จาก QR หรือ barcode) กลับเข้าห้องแชท LINE แล้วปิดหน้าต่าง LIFF
async function sendResultToChat(value, sourceLabel) {
    resultValue.textContent = value;
    resultWrap.classList.add("show");
    setStatus("ok", "✅ สแกนสำเร็จ กำลังส่งกลับ…");

    if (liff.isInClient() && liff.sendMessages) {
        try {
            await liff.sendMessages([
                { type: "text", text: value }
            ]);
            setStatus("ok", "✅ ส่งข้อมูลกลับเข้าแชทแล้ว");
            // หน่วงเล็กน้อยก่อนปิดหน้าต่าง เพื่อให้ WebView บางรุ่น flush การส่งข้อความเสร็จสมบูรณ์ก่อน
            setTimeout(() => liff.closeWindow(), 300);
        } catch (sendErr) {
            console.error(sendErr);
            // สาเหตุที่พบบ่อย: เปิด LIFF ไม่ได้มาจากห้องแชท 1-on-1 กับ OA
            // หรือยังไม่ได้เปิด scope chat_message.write
            setStatus("error", "⚠ ส่งกลับแชทไม่ได้: " + sendErr.message);
        }
    } else {
        setStatus("error", "⚠ ต้องเปิดผ่านห้องแชทกับ Official Account ถึงจะส่งค่ากลับได้");
    }
}

async function main() {
    try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
            setStatus("loading", "กำลังเข้าสู่ระบบ…");
            liff.login();
            return;
        }

        const profile = await liff.getProfile();
        setStatus("ok", `สวัสดี <span class="name">${profile.displayName}</span>`);

        diag.textContent =
            "inClient: " + liff.isInClient() +
            " · scanCodeV2: " + (typeof liff.scanCodeV2 === "function") +
            " · os: " + liff.getOS();

    } catch (err) {
        console.error(err);
        setStatus("error", "⚠ " + err.message);
    }
}

/* ───────── QR Code: ใช้ liff.scanCodeV2 ของ LINE โดยตรง ───────── */
scanBtn.addEventListener("click", async () => {
    const originalText = scanBtn.innerHTML;
    scanBtn.disabled = true;
    scanBtn.innerHTML = "กำลังเปิดกล้อง…";
    resultWrap.classList.remove("show");

    try {
        if (typeof liff.scanCodeV2 !== "function") {
            throw new Error("scanCodeV2 ใช้ไม่ได้บน LIFF SDK เวอร์ชันนี้ ลองอัปเดตแอป LINE");
        }

        const result = await liff.scanCodeV2();

        if (result && result.value) {
            await sendResultToChat(result.value, "QR");
        } else {
            setStatus("error", "⚠ ไม่พบข้อมูลจากการสแกน (ผู้ใช้อาจกดยกเลิก)");
        }

    } catch (err) {
        console.error(err);
        // error ที่พบบ่อย: ไม่ได้เปิด permission "Scan QR" ใน LINE Developers Console
        setStatus("error", "⚠ " + (err.message || "สแกนไม่สำเร็จ"));
    } finally {
        scanBtn.disabled = false;
        scanBtn.innerHTML = originalText;
    }
});

/* ───────── Barcode เส้น (1D) + QR (2D): scanCodeV2 อ่านได้แค่ QR ใช้ ZXing เปิดกล้องเอง ───────── */
let decodeLoopId = null;
let zxingDecoder = null;

barcodeBtn.addEventListener("click", async () => {
    resultWrap.classList.remove("show");

    try {
        if (typeof ZXing === "undefined") {
            // ลองโหลดจาก CDN สำรองอีกแหล่ง เผื่อแหล่งแรกถูกบล็อกโดยเครือข่าย
            await loadScriptFallback("https://cdnjs.cloudflare.com/ajax/libs/zxing-library/0.21.3/index.min.js");
        }
        if (typeof ZXing === "undefined") {
            throw new Error("โหลดไลบรารีสแกนบาร์โค้ดไม่สำเร็จ ตรวจสอบการเชื่อมต่ออินเทอร์เน็ตหรือเครือข่ายองค์กรที่อาจบล็อก CDN");
        }

        barcodeOverlay.classList.add("show");

        // ระบุ format ที่ต้องการอ่านให้ชัดเจน ครอบคลุมทั้ง 1D และ 2D
        // ถ้าไม่ระบุ hints บางเวอร์ชันจะ default ไปลองทุก format ซึ่งช้าและจับยากกว่า
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
            ZXing.BarcodeFormat.QR_CODE,
            ZXing.BarcodeFormat.CODE_128,
            ZXing.BarcodeFormat.CODE_39,
            ZXing.BarcodeFormat.EAN_13,
            ZXing.BarcodeFormat.EAN_8,
            ZXing.BarcodeFormat.UPC_A,
            ZXing.BarcodeFormat.UPC_E,
            ZXing.BarcodeFormat.ITF,
            ZXing.BarcodeFormat.CODABAR
        ]);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

        zxingDecoder = new ZXing.MultiFormatReader();
        zxingDecoder.setHints(hints);

        const constraints = {
            video: {
                facingMode: { ideal: "environment" },
                width:  { ideal: 1280 },
                height: { ideal: 720 }
            }
        };
        mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
        barcodeVideo.srcObject = mediaStream;
        await barcodeVideo.play();

        // เตรียม canvas ไว้ดึงเฟรมจาก video มา decode เอง — ควบคุมจังหวะได้แน่นอนกว่า
        // การพึ่งพา helper ของ ZXing ที่บางครั้งไม่ทำงานในบาง browser/WebView
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d", { willReadFrequently: true });

        const tick = () => {
            if (!mediaStream) return; // ถูกปิดไปแล้ว

            if (barcodeVideo.readyState === barcodeVideo.HAVE_ENOUGH_DATA) {
                canvas.width = barcodeVideo.videoWidth;
                canvas.height = barcodeVideo.videoHeight;
                ctx.drawImage(barcodeVideo, 0, 0, canvas.width, canvas.height);

                try {
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const luminanceSource = new ZXing.RGBLuminanceSource(
                        rgbaToGrayscale(imageData.data, canvas.width, canvas.height),
                        canvas.width,
                        canvas.height
                    );
                    const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
                    const result = zxingDecoder.decode(binaryBitmap);

                    if (result) {
                        stopBarcodeScan();
                        sendResultToChat(result.getText(), result.getBarcodeFormat());
                        return;
                    }
                } catch (e) {
                    // NotFoundException คือยังไม่เจอโค้ดในเฟรมนี้ ปกติมาก ไม่ต้องแสดง error
                }
            }

            decodeLoopId = requestAnimationFrame(tick);
        };

        decodeLoopId = requestAnimationFrame(tick);

    } catch (err) {
        console.error(err);
        stopBarcodeScan();
        // สาเหตุที่พบบ่อย: ผู้ใช้ไม่อนุญาตสิทธิ์กล้องให้เบราว์เซอร์ใน LINE
        setStatus("error", "⚠ เปิดกล้องไม่สำเร็จ: " + (err.message || "ไม่ทราบสาเหตุ"));
    }
});

// แปลง RGBA pixel data เป็น grayscale array ตามที่ ZXing.RGBLuminanceSource ต้องการ
function rgbaToGrayscale(data, width, height) {
    const gray = new Uint8ClampedArray(width * height);
    for (let i = 0, j = 0; i < data.length; i += 4, j++) {
        // ใช้สูตร luminance มาตรฐาน (ITU-R BT.601)
        gray[j] = (data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114) | 0;
    }
    return gray;
}

function stopBarcodeScan() {
    barcodeOverlay.classList.remove("show");

    if (decodeLoopId) {
        cancelAnimationFrame(decodeLoopId);
        decodeLoopId = null;
    }
    zxingDecoder = null;

    if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
    }
    barcodeVideo.srcObject = null;
}

barcodeClose.addEventListener("click", stopBarcodeScan);

main();
</script>

</body>
</html>
