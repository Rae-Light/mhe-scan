<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สแกนบัตรพนักงาน</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg:        #0C0F14;
            --surface:   #141820;
            --border:    #1E2530;
            --accent:    #00D4FF;
            --accent-dim:#003D4D;
            --text:      #E8EDF2;
            --muted:     #5A6475;
            --success:   #00C896;
            --error:     #FF4D6A;
            --scan-line: rgba(0,212,255,0.15);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Sans Thai', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        /* ── Card shell ── */
        .card {
            width: 100%;
            max-width: 360px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0,212,255,0.06);
        }

        /* ── Scanner viewport ── */
        .scanner-zone {
            position: relative;
            height: 220px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* subtle grid */
        .scanner-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 28px 28px;
            opacity: 0.5;
        }

        /* scan-line beam */
        .scan-beam {
            position: absolute;
            left: 20px; right: 20px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: scan 2.4s ease-in-out infinite;
            top: 20px;
        }

        @keyframes scan {
            0%   { top: 20px; opacity: 1; }
            50%  { opacity: 0.9; }
            100% { top: calc(100% - 20px); opacity: 1; }
        }

        /* corner brackets */
        .corners {
            position: absolute;
            width: 160px; height: 120px;
        }

        .corners::before,
        .corners::after,
        .corners span::before,
        .corners span::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            border-color: var(--accent);
            border-style: solid;
        }

        .corners::before  { top: 0; left: 0;  border-width: 2px 0 0 2px; }
        .corners::after   { top: 0; right: 0; border-width: 2px 2px 0 0; }
        .corners span::before { bottom: 0; left: 0;  border-width: 0 0 2px 2px; }
        .corners span::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

        /* card icon in center */
        .card-icon {
            position: relative;
            z-index: 1;
            width: 52px; height: 36px;
            border: 2px solid var(--muted);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.4;
        }

        .card-icon::before {
            content: '';
            width: 18px; height: 4px;
            background: var(--muted);
            border-radius: 2px;
        }

        /* ── Body ── */
        .body {
            padding: 24px 24px 28px;
            text-align: center;
        }

        .label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.3;
            color: var(--text);
            margin-bottom: 20px;
        }

        /* ── Status block ── */
        .status-wrap {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: border-color 0.3s;
            text-align: left;
        }

        .status-wrap.ok    { border-color: var(--success); }
        .status-wrap.error { border-color: var(--error); }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--muted);
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .status-wrap.ok    .status-dot { background: var(--success); box-shadow: 0 0 6px var(--success); }
        .status-wrap.error .status-dot { background: var(--error);   box-shadow: 0 0 6px var(--error);   }
        .status-wrap.loading .status-dot {
            background: var(--accent);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        #status-text {
            font-size: 14px;
            color: var(--text);
            line-height: 1.4;
        }

        #status-text .name {
            font-weight: 600;
            color: var(--accent);
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.02em;
        }

        /* ── Scan button ── */
        .scan-btn {
            width: 100%;
            margin-top: 14px;
            padding: 14px 16px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .scan-btn:active { transform: scale(0.98); }

        .scan-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .scan-btn svg { flex-shrink: 0; }

        /* ── Result block ── */
        .result-wrap {
            margin-top: 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            display: none;
        }

        .result-wrap.show { display: block; }

        .result-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .result-value {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            color: var(--success);
            word-break: break-all;
            line-height: 1.5;
        }

        /* ── Footer strip ── */
        .footer-strip {
            padding: 12px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-strip .dot-row {
            display: flex; gap: 4px;
        }

        .footer-strip .dot-row span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--border);
        }

        .footer-strip .dot-row span:first-child { background: var(--accent-dim); }

        .footer-meta {
            font-size: 11px;
            color: var(--muted);
            font-family: 'IBM Plex Mono', monospace;
        }
    </style>
</head>
<body>

<div class="card">

    <!-- scanner viewport -->
    <div class="scanner-zone">
        <div class="scan-beam"></div>
        <div class="corners"><span></span></div>
        <div class="card-icon"></div>
    </div>

    <!-- content -->
    <div class="body">
        <p class="label">Employee Access</p>
        <h1 class="title">สแกนบัตรพนักงาน</h1>

        <div class="status-wrap loading" id="status-wrap">
            <div class="status-dot"></div>
            <div id="status-text">กำลังเชื่อมต่อ…</div>
        </div>

        <button class="scan-btn" id="scan-btn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
            </svg>
            สแกนบัตร
        </button>

        <div class="result-wrap" id="result-wrap">
            <p class="result-label">ผลการสแกน</p>
            <p class="result-value" id="result-value"></p>
        </div>
    </div>

    <div class="footer-strip">
        <div class="dot-row">
            <span></span><span></span><span></span>
        </div>
        <span class="footer-meta">LIFF · LINE SCAN</span>
    </div>

</div>

<script>
const LIFF_ID = "2010521821-XbCAobxK";

const wrap       = document.getElementById("status-wrap");
const txt        = document.getElementById("status-text");
const scanBtn     = document.getElementById("scan-btn");
const resultWrap  = document.getElementById("result-wrap");
const resultValue = document.getElementById("result-value");

function setStatus(state, html) {
    wrap.className = "status-wrap " + state;
    txt.innerHTML = html;
}

async function main() {
    try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
            setStatus("loading", "กำลังเข้าสู่ระบบ…");
            liff.login();
            return;
        }

        const profile = await liff.getProfile();
        setStatus("ok", `สวัสดี <span class="name">${profile.displayName}</span>`);

        // เปิดใช้งานปุ่มสแกนเมื่อพร้อม และอยู่ใน LINE app เท่านั้น
        if (liff.isInClient() && liff.scanCodeV2) {
            scanBtn.disabled = false;
        } else {
            scanBtn.textContent = "เปิดด้วยแอป LINE เพื่อสแกน";
            scanBtn.disabled = true;
        }

    } catch (err) {
        console.error(err);
        setStatus("error", "⚠ " + err.message);
    }
}

scanBtn.addEventListener("click", async () => {
    scanBtn.disabled = true;
    const originalText = scanBtn.innerHTML;
    scanBtn.innerHTML = "กำลังเปิดกล้อง…";

    try {
        const result = await liff.scanCodeV2();
        // result.value คือข้อความที่อ่านได้จาก QR/บาร์โค้ด

        if (result && result.value) {
            resultValue.textContent = result.value;
            resultWrap.classList.add("show");
            setStatus("ok", "✅ สแกนสำเร็จ");
        } else {
            setStatus("error", "⚠ ไม่พบข้อมูลจากการสแกน");
        }

    } catch (err) {
        console.error(err);
        setStatus("error", "⚠ " + err.message);
    } finally {
        scanBtn.disabled = false;
        scanBtn.innerHTML = originalText;
    }
});

main();
</script>

</body>
</html>
