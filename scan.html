<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สแกนบัตรพนักงาน</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      background: #f0f0f0;
    }
    h2 { color: #1DB446; }
    #reader { width: 300px; }
    #status { margin-top: 16px; font-size: 16px; color: #333; }
  </style>
</head>
<body>
  <h2>📷 สแกนบัตรพนักงาน</h2>
  <div id="reader"></div>
  <p id="status">กำลังเปิดกล้อง...</p>

  <script>
    // ✅ ใส่ LIFF ID จริงแล้ว
    const LIFF_ID = "2010521821-XbCAobxK";

    liff.init({ liffId: LIFF_ID })
      .then(() => {
        const scanner = new Html5Qrcode("reader");
        scanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          (decodedText) => {
            scanner.stop().then(() => {
              document.getElementById("status").innerText
                = "✅ สแกนสำเร็จ: " + decodedText;
              liff.sendMessages([{
                type: "text",
                text: decodedText.trim()
              }]).then(() => liff.closeWindow());
            });
          },
          (err) => { /* ยังไม่เจอ QR */ }
        );
      })
      .catch(err => {
        document.getElementById("status").innerText
          = "❌ เกิดข้อผิดพลาด: " + err.message;
      });
  </script>
</body>
</html>
